<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'quittances-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
  toast('Sauvegarde export\u00e9e \u2713');
}
function importData(ev) {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.properties) throw new Error('Format invalide');
      if (!confirm('Remplacer toutes vos donn\u00e9es actuelles par celles du fichier import\u00e9 ?')) return;
      state = imported;
      await save();
      render();
      toast('Donn\u00e9es import\u00e9es \u2713');
    } catch(err) {
      toast('\u26a0 Fichier invalide');
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}


// ═══════════════ GITHUB SYNC ═══════════════

function ghLoadConfig() {
  try {
    return JSON.parse(localStorage.getItem('gh_cfg') || '{}');
  } catch(e) { return {}; }
}

function ghSaveConfig() {
  const user = (document.getElementById('gh-user')?.value || '').trim();
  const repo = (document.getElementById('gh-repo')?.value || '').trim();
  const token = (document.getElementById('gh-token')?.value || '').trim();
  if (!user || !repo || !token) { toast('\u26a0 Remplissez les 3 champs GitHub'); return; }
  localStorage.setItem('gh_cfg', JSON.stringify({user, repo, token}));
  ghUpdateBanner({user, repo, token});
  toast('Configuration GitHub enregistr\u00e9e \u2713');
}

function ghUpdateBanner(cfg) {
  const banner = document.getElementById('gh-status-banner');
  if (!banner) return;
  if (cfg && cfg.user && cfg.repo && cfg.token) {
    banner.style.display = 'block';
    banner.style.cssText = 'display:block;background:var(--accent-light);border:1px solid #b8d4c0;border-radius:6px;padding:.6rem .85rem;font-size:.78rem;color:var(--accent);margin-bottom:.85rem;';
    banner.innerHTML = '&#9729; Connect\u00e9 &agrave; <strong>' + cfg.user + '/' + cfg.repo + '</strong> &mdash; sauvegarde automatique active';
  } else {
    banner.style.display = 'none';
  }
}

async function ghPush(cfg) {
  if (!cfg) cfg = ghLoadConfig();
  if (!cfg.user || !cfg.repo || !cfg.token) return false;
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(state, null, 2))));
    const apiUrl = 'https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/data.json';
    // Get current SHA if file exists
    let sha = null;
    try {
      const getRes = await fetch(apiUrl, {
        headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (getRes.ok) {
        const getJson = await getRes.json();
        sha = getJson.sha;
      }
    } catch(e) {}
    // Push
    const body = { message: 'Sauvegarde automatique ' + new Date().toISOString().slice(0,16).replace('T',' '), content };
    if (sha) body.sha = sha;
    const res = await fetch(apiUrl, {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + cfg.token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
    return res.ok;
  } catch(e) {
    console.error('GitHub sync error:', e);
    return false;
  }
}

async function ghSync() {
  const cfg = ghLoadConfig();
  if (!cfg.user || !cfg.repo || !cfg.token) { toast('\u26a0 Configurez GitHub d\'abord'); return; }
  const btn = document.getElementById('gh-sync-btn');
  if (btn) btn.textContent = 'Synchronisation...';
  const ok = await ghPush(cfg);
  if (btn) btn.textContent = '\u2601 Synchroniser';
  toast(ok ? 'Synchronis\u00e9 sur GitHub \u2713' : '\u26a0 Erreur de synchronisation');
}

async function ghRestoreFromGitHub() {
  const cfg = ghLoadConfig();
  if (!cfg.user || !cfg.repo || !cfg.token) return;
  try {
    const apiUrl = 'https://api.github.com/repos/' + cfg.user + '/' + cfg.repo + '/contents/data.json';
    const res = await fetch(apiUrl, {
      headers: { 'Authorization': 'token ' + cfg.token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) return;
    const json = await res.json();
    const decoded = JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\n/g,'')))));
    if (decoded && decoded.properties) {
      state = decoded;
      await save();
      render();
      toast('Donn\u00e9es restaur\u00e9es depuis GitHub \u2713');
    }
  } catch(e) {
    console.error('GitHub restore error:', e);
  }
}

<script>
// ═══════════════ PIN ═══════════════
const CORRECT_PIN = '1818';
let pinEntry = '';
let pinLocked = true;

function pinPress(digit) {
  if (pinEntry.length >= 4) return;
  pinEntry += digit;
  updatePinDots();
  if (pinEntry.length === 4) setTimeout(checkPin, 150);
}

function pinDel() {
  if (!pinEntry.length) return;
  pinEntry = pinEntry.slice(0, -1);
  updatePinDots();
  document.getElementById('pin-error').innerHTML = '&nbsp;';
}

function updatePinDots(mode) {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    if (!d) continue;
    d.className = 'pin-dot';
    if (mode === 'error') d.classList.add('error');
    else if (i < pinEntry.length) d.classList.add('filled');
  }
}

function checkPin() {
  if (pinEntry === CORRECT_PIN) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    pinLocked = false;
    pinEntry = '';
    updatePinDots();
    initApp();
  } else {
    updatePinDots('error');
    document.getElementById('pin-error').textContent = 'Code incorrect — réessayez';
    setTimeout(() => {
      pinEntry = '';
      updatePinDots();
      document.getElementById('pin-error').innerHTML = '&nbsp;';
    }, 1000);
  }
}

function lockApp() {
  pinLocked = true;
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-error').innerHTML = '&nbsp;';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (!pinLocked) return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  if (e.key === 'Backspace') pinDel();
});

// ═══════════════ DB ═══════════════
const DB = 'QlDB7', ST = 'data';
let db, state = {properties:[], activePropertyId:null};
let tab = 'generer', screen = 'home';
let delProp=null, delArc=null, pendingMailto='', appInited=false;

function openDB() {
  return new Promise((res,rej) => {
    const r = indexedDB.open(DB, 1);
    r.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains(ST)) e.target.result.createObjectStore(ST); };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror = rej;
  });
}
function dbGet(k) { return new Promise((res,rej) => { const r=db.transaction(ST,'readonly').objectStore(ST).get(k); r.onsuccess=()=>res(r.result); r.onerror=rej; }); }
function dbSet(k,v) { return new Promise((res,rej) => { const r=db.transaction(ST,'readwrite').objectStore(ST).put(v,k); r.onsuccess=res; r.onerror=rej; }); }
async function save() { await dbSet('state', state); }
async function initApp() {
  if (appInited) { render(); return; }
  appInited = true;
  await openDB();
  const saved = await dbGet('state');
  if (saved) {
    state = saved;
    render();
    // If GitHub configured, silently sync in background (push local → GitHub)
    const cfg = ghLoadConfig();
    if (cfg.user && cfg.repo && cfg.token && state.properties && state.properties.length > 0) {
      ghPush(cfg); // fire and forget
    }
  } else {
    // No local data — try to restore from GitHub
    render();
    const cfg = ghLoadConfig();
    if (cfg.user && cfg.repo && cfg.token) {
      toast('Restauration depuis GitHub...');
      await ghRestoreFromGitHub();
    }
  }
}

// ═══════════════ UTILS ═══════════════
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fISO(d) { return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; }
function p2(n) { return String(n).padStart(2,'0'); }
function fFR(iso) { if(!iso)return''; const p=iso.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0].slice(2)}`:iso; }
function fFRlong(iso) { if(!iso)return''; const p=iso.split('-'); const m=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre']; return `${parseInt(p[2])} ${m[parseInt(p[1])-1]} 20${p[0].slice(2)}`; }
function fmt(v) { return parseFloat(v||0).toFixed(2).replace('.',','); }
function total(p) { return (p.loyer||0)+(p.majoration||0)+(p.charges||0)+(p.eau||0)+(p.eclairage||0)+(p.chauffage||0)+(p.taxes_locatives||0)+(p.ordures||0)+(p.ascenseur||0)+(p.prestations||0); }
function villeOf(adr) { if(!adr)return''; const l=(adr||'').split('\n').pop().trim(); const m=l.match(/\d{5}\s+(.+)/); return m?m[1]:l; }
function sanitize(s) { return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'_'); }
function toast(msg) { const e=document.getElementById('toast'); e.textContent=msg; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2800); }
function getProp() { return state.properties.find(p=>p.id===state.activePropertyId)||null; }
function nextNum(prop) { if(!prop.archives||!prop.archives.length)return 1; return Math.max(...prop.archives.map(a=>a.num_int||1))+1; }
function nextPeriod(prop) {
  if(prop.archives&&prop.archives.length>0){const last=[...prop.archives].sort((a,b)=>b.period_end.localeCompare(a.period_end))[0];const s=new Date(last.period_end+'T00:00:00');const e=new Date(s);e.setMonth(e.getMonth()+1);return{start:fISO(s),end:fISO(e)};}
  if(prop.last_period_end){const s=new Date(prop.last_period_end+'T00:00:00');const e=new Date(s);e.setMonth(e.getMonth()+1);return{start:fISO(s),end:fISO(e)};}
  const now=new Date();return{start:fISO(new Date(now.getFullYear(),now.getMonth(),1)),end:fISO(new Date(now.getFullYear(),now.getMonth()+1,1))};
}
function newProp(name) { return {id:'p'+Date.now(),name,proprietaire_nom:'',proprietaire_adresse:'',locataire_nom:'',locataire_prenom:'',locataire_email:'',locataire_civilite:'M.',locataire_adresse:'',logement_adresse:'',loyer:0,majoration:0,charges:0,eau:0,eclairage:0,chauffage:0,taxes_locatives:0,ordures:0,ascenseur:0,prestations:0,signature_img:null,last_period_end:null,archives:[]}; }

function selectProp(id) { state.activePropertyId=id; screen='property'; tab='generer'; save(); render(); }

}

async function saveParam(pid) {
  const prop=state.properties.find(p=>p.id===pid); if(!prop)return;
  prop.proprietaire_nom=document.getElementById('p_nom').value.trim();
  prop.proprietaire_adresse=document.getElementById('p_adr').value.trim();
  prop.locataire_civilite=document.getElementById('p_civ').value;
  prop.locataire_prenom=document.getElementById('p_lpr').value.trim();
  prop.locataire_nom=document.getElementById('p_lno').value.trim();
  prop.locataire_email=document.getElementById('p_eml').value.trim();
  prop.locataire_adresse=document.getElementById('p_loc_adr').value.trim();
  prop.logement_adresse=prop.locataire_adresse.replace(/\n/g,' ');
  ['loyer','majoration','charges','eau','eclairage','chauffage','taxes_locatives','ordures','ascenseur','prestations'].forEach(k=>{ prop[k]=parseFloat(document.getElementById('p_'+k)?.value||0); });
  prop.last_period_end=document.getElementById('p_lpe').value||null;
  await save(); toast('Param\u00e8tres enregistr\u00e9s \u2713');
  // Auto-sync to GitHub if configured
  const cfg = ghLoadConfig();
  if (cfg.user && cfg.repo && cfg.token) {
    ghPush(cfg).then(ok => {
      if (ok) toast('Enregistr\u00e9 et synchronis\u00e9 \u2713');
    });
  }
}

function uploadSig(ev,pid) {
  const f=ev.target.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas'); canvas.width=img.naturalWidth; canvas.height=img.naturalHeight;
      canvas.getContext('2d').drawImage(img,0,0);
      const prop=state.properties.find(p=>p.id===pid); if(!prop)return;
      prop.signature_img=canvas.toDataURL('image/png'); await save();
      const prv=document.getElementById('sig-prv');
      if(prv) prv.innerHTML=`<div style="text-align:center"><img src="${prop.signature_img}" style="max-height:70px;max-width:200px;object-fit:contain"><br><small style="color:var(--ink-3);font-size:.72rem;display:block;margin-top:.3rem">Appuyer pour remplacer</small></div>`;
      toast('Signature importée ✓');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}

async function deleteProp(pid) { if(!confirm('Supprimer ce logement et toutes ses archives ?'))return; state.properties=state.properties.filter(p=>p.id!==pid); state.activePropertyId=null; screen='home'; await save(); render(); toast('Logement supprimé'); }

function buildQDoc(prop) {

async function doGenerate(pid) {
  const prop=state.properties.find(p=>p.id===pid); if(!prop)return;
  if(!prop.proprietaire_nom||!prop.locataire_nom||!prop.logement_adresse){toast('⚠ Complétez le paramétrage d\'abord');return;}
  const s=document.getElementById('g_s').value,e=document.getElementById('g_e').value,d=document.getElementById('g_d').value;
  const tot=total(prop),num=nextNum(prop),numStr=p2(num);
  const arc={id:'a'+Date.now(),numero:numStr,num_int:num,date_generation:d,period_start:s,period_end:e,total:tot,locataire:`${prop.locataire_prenom} ${prop.locataire_nom}`,civilite:prop.locataire_civilite||'M.'};
  if(!prop.archives)prop.archives=[];
  prop.archives.push(arc); prop.archives.sort((a,b)=>a.period_start.localeCompare(b.period_start));
  await save(); buildPDF(prop,arc); tab='archives'; render();
  setTimeout(()=>showMailBanner(prop,arc),80);
  // Auto-sync
  const gcfg = ghLoadConfig();
  if (gcfg.user && gcfg.repo && gcfg.token) ghPush(gcfg);

function showMailBanner(prop,arc) {

  main.insertBefore(banner,main.firstChild);
}

function buildPDF(prop,arc) {
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a5',orientation:'portrait'});
  const v=villeOf(prop.proprietaire_adresse),civ=arc.civilite||prop.locataire_civilite||'M.';
  let y=14;
  doc.setFont('helvetica'); doc.setFontSize(9); doc.setTextColor(80,80,80);
  doc.text(prop.proprietaire_nom||'',14,y); y+=4;
  (prop.proprietaire_adresse||'').split('\n').forEach(l=>{doc.text(l,14,y);y+=4;});
  doc.setFontSize(15);doc.setFont('helvetica','bold');doc.setTextColor(26,110,58);
  doc.text('QUITTANCE DE LOYER',143,14,{align:'right'});
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
  doc.text('N° '+arc.numero,143,21,{align:'right'});
  y=Math.max(y,28)+4;
  doc.setFillColor(240,240,240);doc.rect(14,y,134,7,'F');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);
  doc.text('Désignation',16,y+5);doc.text('Montant (€)',144,y+5,{align:'right'});y+=7;
  const rows=[['Loyer',prop.loyer],['Majoration',prop.majoration],['Charges',prop.charges],['Eau',prop.eau],['Éclairage',prop.eclairage],['Chauffage',prop.chauffage],['Taxes locatives',prop.taxes_locatives],['Ordures ménagères',prop.ordures],['Ascenseur',prop.ascenseur],['Prestations',prop.prestations]];
  doc.setFont('helvetica','normal');doc.setFontSize(8);
  rows.forEach(([l,v2])=>{doc.setDrawColor(210,210,210);doc.setLineWidth(0.2);doc.line(14,y,148,y);doc.setTextColor(60,60,60);doc.text(l,16,y+5);doc.text(fmt(v2),144,y+5,{align:'right'});y+=7;});
  doc.setDrawColor(140,140,140);doc.setLineWidth(0.5);doc.line(14,y,148,y);doc.setLineWidth(0.2);
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('Total',16,y+6);doc.text(fmt(arc.total)+' €',144,y+6,{align:'right'});y+=12;
  doc.setDrawColor(200,200,200);doc.rect(14,y,134,40);
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(30,30,30);let by=y+7;
  ['Reçu de '+civ+' '+prop.locataire_prenom+' '+prop.locataire_nom+',','au titre du paiement du loyer et des charges du logement/local sis','à '+prop.logement_adresse+',','pour la période du '+fFR(arc.period_start)+' au '+fFR(arc.period_end)+',','la somme de '+fmt(arc.total)+' €.'].forEach(l=>{doc.text(l,16,by);by+=6;});
  y+=45;
  doc.setFontSize(7.5);doc.setTextColor(100,100,100);doc.setFont('helvetica','italic');doc.text('Dont quittance, et sous réserve de tous mes droits.',14,y);y+=10;
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
  doc.text('A '+v+',',14,y);doc.text('le '+fFR(arc.date_generation),14,y+5);doc.text('Signature :',105,y);
  if(prop.signature_img){try{doc.addImage(prop.signature_img,'PNG',103,y+3,38,18,'','FAST');}catch(err){doc.line(103,y+22,148,y+22);}}
  else{doc.line(103,y+22,148,y+22);}
  doc.save('quittance_'+sanitize(prop.name)+'_'+arc.period_start+'_n'+arc.numero+'.pdf');
}

function renderArchives(el,prop) {
  const arcs=[...(prop.archives||[])].sort((a,b)=>a.period_start.localeCompare(b.period_start));
  el.innerHTML=`<div class="sec-hdr"><div class="sec-title">Archives</div><span style="font-size:.82rem;color:var(--ink-3)">${arcs.length} quittance${arcs.length!==1?'s':''}</span></div>${arcs.length===0?`<div class="empty-state" style="padding:3rem 1rem"><div class="icon">??</div><h2>Aucune archive</h2><p>Les quittances générées apparaîtront ici.</p></div>`:arcs.map(a=>`<div class="arc-item"><div class="arc-badge">N° ${a.numero}</div><div class="arc-info"><div class="arc-tenant">${esc(a.locataire)}</div><div class="arc-period">${fFR(a.period_start)} → ${fFR(a.period_end)} <span style="color:var(--ink-4)">&middot; ${fFR(a.date_generation)}</span></div></div><div class="arc-amount">${fmt(a.total)} €</div><div class="arc-actions"><button class="btn btn-ghost btn-sm" onclick="rePDF('${prop.id}','${a.id}')">&#8595;</button><button class="btn btn-ghost btn-sm" style="color:var(--blue);border-color:#b0c8e8" onclick="openMailModal('${prop.id}','${a.id}')">&#9993;</button><button class="btn btn-ghost btn-sm" style="color:var(--danger);border-color:#f5c4b0" onclick="askDel('${prop.id}','${a.id}','${a.numero}','${esc(a.locataire)}','${fFR(a.period_start)}','${fFR(a.period_end)}')">&#10005;</button></div></div>`).join('')}`;
}

function askDel(pid,aid,num,loc,s,e) { delProp=pid;delArc=aid; document.getElementById('del-info').innerHTML=`Quittance <strong>n° ${num}</strong> — ${esc(loc)}<br>Période : ${s} → ${e}`; openModal('modal-del'); }
async function doDeleteArchive() {
  const prop=state.properties.find(p=>p.id===delProp); if(!prop){closeModal('modal-del');return;}
  prop.archives=prop.archives.filter(a=>a.id!==delArc); prop.archives.sort((a,b)=>a.period_start.localeCompare(b.period_start));
  prop.archives.forEach((a,i)=>{a.num_int=i+1;a.numero=p2(i+1);});
  await save(); closeModal('modal-del'); render(); toast('Quittance supprimée · numéros recalculés ✓');
}
function rePDF(pid,aid) { const prop=state.properties.find(p=>p.id===pid); if(!prop)return; const arc=prop.archives.find(a=>a.id===aid); if(!arc)return; buildPDF(prop,arc); toast('PDF retéléchargé ✓'); }

function buildMailBody(prop,arc) {
  const civ=arc.civilite||prop.locataire_civilite||'M.';
  return 'Bonjour '+civ+' '+prop.locataire_nom+',\n\nVeuillez trouver ci-joint votre quittance de loyer n° '+arc.numero+' pour la période du '+fFRlong(arc.period_start)+' au '+fFRlong(arc.period_end)+', d\'un montant de '+fmt(arc.total)+' €.\n\nN\'hésitez pas à me contacter si vous avez la moindre question.\n\nCordialement,\n'+(prop.proprietaire_nom||'');
}
function openMailModal(propId,arcId) {
  const prop=state.properties.find(p=>p.id===propId); if(!prop)return;
  const arc=prop.archives.find(a=>a.id===arcId); if(!arc)return;
  if(!prop.locataire_email){toast('⚠ Ajoutez l\'email du locataire dans les paramètres');return;}
  const subject='Quittance de loyer n° '+arc.numero, body=buildMailBody(prop,arc);
  pendingMailto='mailto:'+encodeURIComponent(prop.locataire_email)+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  const filename='quittance_'+sanitize(prop.name)+'_'+arc.period_start+'_n'+arc.numero+'.pdf';
  document.getElementById('mail-modal-subtitle').textContent='Quittance n° '+arc.numero+' · '+arc.locataire;
  document.getElementById('mail-preview-block').innerHTML='<div class="mail-field"><strong>À&nbsp;:</strong><span>'+esc(prop.locataire_email)+'</span></div><div class="mail-field"><strong>Objet&nbsp;:</strong><span>'+esc(subject)+'</span></div><div class="mail-body">'+esc(body)+'</div><div class="mail-attach">?? '+esc(filename)+' <span style="color:var(--ink-3);font-size:.73rem">(à attacher manuellement)</span></div>';
  document.getElementById('modal-mail').style.display='flex';
}
function doOpenMail() { if(pendingMailto)window.location.href=pendingMailto; closeModal('modal-mail'); toast('App Mail ouverte ✓'); }

function openModal(id) { document.getElementById(id).style.display='flex'; }
function closeModal(id) { document.getElementById(id).style.display='none'; if(id==='modal-add')document.getElementById('new-name').value=''; if(id==='modal-del'){delProp=null;delArc=null;} if(id==='modal-mail')pendingMailto=''; }
['modal-add','modal-del','modal-mail'].forEach(id=>{ document.getElementById(id).addEventListener('click',e=>{ if(e.target.id===id)closeModal(id); }); });
document.getElementById('new-name').addEventListener('keydown',e=>{ if(e.key==='Enter')doAddProp(); });
async function doAddProp() {
  const name=document.getElementById('new-name').value.trim(); if(!name){toast('⚠ Saisissez un nom');return;}
  closeModal('modal-add'); const prop=newProp(name); state.properties.push(prop); state.activePropertyId=prop.id;
  screen='property'; tab='generer'; await save(); render(); toast('"'+name+'" créé ✓');
}
</script>
</body>
</html>
