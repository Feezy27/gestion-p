<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--ink-2:#4a4a45;--ink-3:#8a8a82;--ink-4:#c8c8be;
  --paper:#f9f8f4;--paper-2:#f2f1eb;--paper-3:#e8e6dc;
  --stone:#4a4a45;
  --accent:#2d5a3d;--accent-l:#e8f0eb;
  --blue:#1a4a7a;--blue-l:#e8f0f8;
  --danger:#c8461a;--danger-l:#fdf0ec;
  --r:6px;--rl:12px;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)
}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;overscroll-behavior:none}

/* PIN */
#pin-screen{position:fixed;inset:0;z-index:9999;background:#4a4a45;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:max(3rem,env(safe-area-inset-top,0px));padding-bottom:max(2rem,env(safe-area-inset-bottom,0px))}
.pin-logo{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#f9f8f4;margin-bottom:.4rem}
.pin-logo span{color:#c8c8be;font-style:italic}
.pin-sub{font-size:.82rem;color:#9a9a92;margin-bottom:2.5rem}
.pin-dots{display:flex;gap:1.25rem;margin-bottom:.5rem}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #7a7a72;background:transparent;transition:all .15s}
.pin-dot.filled{background:#f9f8f4;border-color:#f9f8f4;transform:scale(1.1)}
.pin-dot.error{background:#c8461a;border-color:#c8461a}
.pin-err{height:1.5rem;font-size:.82rem;color:#e87060;margin-bottom:1.5rem;text-align:center}
.pin-grid{display:grid;grid-template-columns:repeat(3,80px);gap:1rem}
.pk{width:80px;height:80px;background:rgba(255,255,255,.12);border:none;border-radius:50%;color:#f9f8f4;font-size:1.6rem;font-weight:300;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.pk:active{background:rgba(255,255,255,.3);transform:scale(.91)}
.pk.del{font-size:1.8rem;color:#c8c8be;background:transparent}
.pk.del:active{background:rgba(255,255,255,.12)}
.pk.empty{background:transparent;pointer-events:none}

/* APP */
#app{display:none;min-height:100vh}
.hdr{background:var(--stone);color:var(--paper);padding:0 1rem;padding-top:var(--st);display:flex;align-items:center;justify-content:space-between;height:calc(52px + var(--st));position:sticky;top:0;z-index:100;gap:.75rem}
.hdr-l{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.hbtn{background:rgba(255,255,255,.12);border:none;color:var(--paper);width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;-webkit-tap-highlight-color:transparent}
.hbtn:active{background:rgba(255,255,255,.25)}
.logo{font-family:'DM Serif Display',serif;font-size:1rem;white-space:nowrap}
.logo span{color:#c8c8be;font-style:italic}
.hdr-c{flex:1;min-width:0}
.hprop{font-size:.72rem;color:#c8c8be;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;background:rgba(255,255,255,.1);border-radius:6px;padding:.3rem .65rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
.hprop.empty{opacity:0;pointer-events:none}
.hdr-r{display:flex;align-items:center;flex-shrink:0}
.lbtn{background:none;border:none;color:#9a9a92;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.95rem;-webkit-tap-highlight-color:transparent}
.lbtn:active{background:rgba(255,255,255,.1)}

/* HOME */
.home{max-width:820px;margin:0 auto;padding:1.5rem 1.25rem;padding-bottom:calc(3rem + var(--sb))}
.home h1{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:.35rem}
.home-sub{font-size:.85rem;color:var(--ink-3);margin-bottom:2rem}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.85rem}
.pcard{background:#fff;border:1px solid var(--paper-3);border-radius:var(--rl);padding:1.25rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pcard:active{border-color:var(--accent)}
.pcard-icon{font-size:1.5rem;margin-bottom:.65rem}
.pcard-name{font-weight:600;font-size:.95rem;margin-bottom:.25rem}
.pcard-meta{font-size:.78rem;color:var(--ink-3)}
.pcard-add{background:var(--paper-2);border:1.5px dashed var(--paper-3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;color:var(--ink-3);min-height:100px}
.pcard-add .ai{font-size:1.5rem}
.pcard-add span{font-size:.85rem}

/* NAV */
.propbar{background:var(--paper-2);border-bottom:1px solid var(--paper-3);padding:.6rem 1.25rem;display:flex;align-items:center;gap:.75rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.propbar::-webkit-scrollbar{display:none}
.pbl{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);white-space:nowrap;flex-shrink:0}
.chip{padding:.4rem 1rem;border-radius:20px;border:1px solid var(--paper-3);background:var(--paper);font-size:.82rem;cursor:pointer;color:var(--ink-2);white-space:nowrap;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.chip.add{border-style:dashed;color:var(--ink-3)}
.tabs{display:flex;border-bottom:1px solid var(--paper-3);background:var(--paper);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tb{padding:.9rem 1.1rem;font-size:.85rem;font-weight:500;color:var(--ink-3);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.tb.on{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
.main{max-width:820px;margin:0 auto;padding:1.25rem;padding-bottom:calc(3rem + var(--sb))}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.2rem;border-radius:var(--r);font-size:.875rem;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{opacity:.8}
.bp{background:var(--accent);color:#fff}
.bb{background:var(--blue);color:#fff}
.bg{background:transparent;color:var(--ink-2);border:1px solid var(--paper-3)}
.bd{background:var(--danger);color:#fff}
.bsm{padding:.4rem .85rem;font-size:.8rem}
.bfull{width:100%;justify-content:center;padding:.8rem;font-size:.95rem}
.bsave{width:100%;justify-content:center;padding:1rem 1.5rem;font-size:1rem;font-weight:600;border-radius:var(--rl);background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(45,90,61,.22);margin-top:.5rem;display:flex;align-items:center;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.bsave:active{transform:scale(.98);opacity:.9}
.bgen{width:100%;justify-content:center;padding:1.1rem 1.5rem;font-size:1.1rem;font-weight:600;border-radius:var(--rl);background:var(--accent);color:#fff;letter-spacing:.01em;box-shadow:0 3px 12px rgba(45,90,61,.25);margin-top:.5rem;display:flex;align-items:center;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.bgen:active{transform:scale(.98);opacity:.9}

/* CARDS & FORMS */
.card{background:#fff;border:1px solid var(--paper-3);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem}
.ct{font-family:'DM Serif Display',serif;font-size:1.05rem;margin-bottom:1.1rem;padding-bottom:.65rem;border-bottom:1px solid var(--paper-2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.fg.c1{grid-template-columns:1fr}
.fg.c3{grid-template-columns:1fr 1fr 1fr}
.fi{display:flex;flex-direction:column;gap:.3rem}
.fi.s2{grid-column:span 2}
label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3)}
input[type=text],input[type=number],input[type=date],input[type=email],input[type=password],textarea,select{padding:.65rem .8rem;border:1px solid var(--paper-3);border-radius:var(--r);font-size:.9rem;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--paper);width:100%;-webkit-appearance:none;min-height:44px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);background:#fff}
textarea{resize:vertical;min-height:70px}
.hint{font-size:.72rem;color:var(--ink-3);line-height:1.4}

/* AMOUNTS TABLE */
.at{width:100%;border-collapse:collapse}
.at td{padding:.45rem 0;border-bottom:1px solid var(--paper-2);font-size:.85rem;vertical-align:middle}
.at td:last-child{width:130px}
.at td input{text-align:right;min-height:40px}
.at .tot td{font-weight:600;border-bottom:none;padding-top:.85rem}

/* SIGNATURE */
.sigbox{border:1.5px dashed var(--paper-3);border-radius:var(--r);padding:1.25rem;text-align:center;cursor:pointer;background:var(--paper);min-height:80px;display:flex;align-items:center;justify-content:center}
.sigbox img{max-height:70px;max-width:200px;object-fit:contain}

/* QUITTANCE PREVIEW */
.qdoc{background:#fff;border:1px solid var(--ink-4);border-radius:var(--r);padding:1.25rem;font-family:Arial,sans-serif;font-size:11px;color:#111;overflow-x:auto}
.qh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;gap:.75rem}
.qprop{font-size:10.5px;line-height:1.6;color:#333;flex:1}
.qtb{text-align:right;flex-shrink:0;padding-right:6px}
.qtitle{font-size:14px;font-weight:bold;color:#1a6e3a;text-transform:uppercase}
.qnum{font-size:10px;margin-top:3px;color:#555}
.qtab{width:100%;border-collapse:collapse;margin-bottom:1rem;font-size:10.5px}
.qtab th{background:#f0f0f0;padding:3px 6px;border:1px solid #ccc;text-align:left;font-size:10px}
.qtab td{border:1px solid #ddd;padding:3px 6px}
.qtab td:last-child{text-align:right}
.qtab .tot-r td{background:#f9f9f9;font-weight:bold;border-top:2px solid #999}
.qbody{border:1px solid #ddd;border-radius:2px;padding:.85rem;margin-bottom:.85rem;line-height:1.8;font-size:11px}
.qres{font-style:italic;color:#666;font-size:9.5px;border-top:1px solid #ddd;padding-top:.5rem;margin-top:.6rem}
.qfoot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:1rem;font-size:10.5px}

/* ARCHIVES */
.arc{background:#fff;border:1px solid var(--paper-3);border-radius:var(--rl);padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
.abadge{background:var(--accent-l);color:var(--accent);font-size:.72rem;font-weight:600;padding:.28rem .6rem;border-radius:20px;white-space:nowrap;flex-shrink:0}
.ainfo{flex:1;min-width:120px}
.aten{font-weight:500;font-size:.875rem}
.aper{font-size:.76rem;color:var(--ink-3);margin-top:2px}
.aamt{font-weight:600;font-size:.95rem;color:var(--accent);white-space:nowrap;flex-shrink:0}
.aact{display:flex;gap:.4rem;margin-left:auto;flex-wrap:wrap;justify-content:flex-end}

/* MISC */
.genbox{background:var(--accent-l);border:1px solid #b8d4c0;border-radius:var(--r);padding:.9rem 1.1rem;margin-bottom:1.1rem;font-size:.85rem;line-height:1.7;color:var(--accent)}
.notice{background:#fffbf0;border:1px solid #f0d890;border-radius:var(--r);padding:.6rem .85rem;font-size:.78rem;color:#7a6010;margin-bottom:.85rem;line-height:1.5}
.ghbox{background:var(--accent-l);border:1px solid #b8d4c0;border-radius:var(--r);padding:.6rem .85rem;font-size:.78rem;color:var(--accent);margin-bottom:.85rem;line-height:1.5}
.mailbanner{background:var(--blue-l);border:1px solid #b0c8e8;border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1rem}
.mailbanner-t{font-weight:600;font-size:.9rem;color:var(--blue);margin-bottom:.35rem}
.mailbanner p{font-size:.82rem;color:#2a4a6a;line-height:1.55}
.atip{margin-top:.6rem;background:#fff;border:1px solid #b0c8e8;border-radius:var(--r);padding:.6rem .8rem;font-size:.8rem;color:var(--blue)}
.atip strong{display:block;margin-bottom:.2rem}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.sh-t{font-family:'DM Serif Display',serif;font-size:1.25rem}
.spin{width:28px;height:28px;border:2px solid var(--paper-3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;gap:1rem;color:var(--ink-3);font-size:.875rem}
.toast{position:fixed;bottom:calc(1.5rem + var(--sb));left:50%;transform:translateX(-50%) translateY(14px);background:var(--stone);color:#fff;padding:.8rem 1.4rem;border-radius:var(--rl);font-size:.875rem;opacity:0;transition:all .25s;z-index:9998;pointer-events:none;white-space:nowrap;max-width:calc(100vw - 2.5rem);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.overlay{align-items:center}}
.modal{background:#fff;border-radius:var(--rl) var(--rl) 0 0;padding:1.5rem;padding-bottom:calc(1.5rem + var(--sb));width:100%;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{max-width:480px;border-radius:var(--rl);padding-bottom:1.5rem}}
.mh{width:36px;height:4px;background:var(--paper-3);border-radius:2px;margin:0 auto 1.25rem}
.mt{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:.25rem}
.ms{font-size:.82rem;color:var(--ink-3);margin-bottom:1.25rem}
.ma{display:flex;flex-direction:column;gap:.6rem;margin-top:1.1rem}
@media(min-width:600px){.ma{flex-direction:row;justify-content:flex-end}}
.delinfo{background:var(--danger-l);border:1px solid #f5c4b0;border-radius:var(--r);padding:.8rem .95rem;font-size:.84rem;color:var(--danger);margin-bottom:.85rem;line-height:1.5}
.mp{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--r);padding:1rem;font-size:.82rem;line-height:1.7;color:var(--ink-2);margin-bottom:1rem}
.mf{display:flex;gap:.5rem;margin-bottom:.35rem;font-size:.78rem}
.mf strong{color:var(--ink-3);min-width:45px}
.mb{margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--paper-3);white-space:pre-line}
.mattach{margin-top:.6rem;padding:.5rem .7rem;background:var(--blue-l);border:1px solid #b0c8e8;border-radius:var(--r);font-size:.78rem;color:var(--blue);display:flex;align-items:center;gap:.5rem}
.empty{text-align:center;padding:4rem 1.5rem}
.empty .ei{width:64px;height:64px;margin:0 auto 1.25rem;background:var(--paper-2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.75rem}
.empty h2{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:.5rem}
.empty p{color:var(--ink-3);font-size:.875rem;margin-bottom:1.5rem;line-height:1.6}
@media(max-width:599px){
  .fg{grid-template-columns:1fr}.fg.c3{grid-template-columns:1fr 1fr}
  .fi.s2{grid-column:span 1}.main{padding:1rem;padding-bottom:calc(3rem + var(--sb))}
  .home{padding:1.25rem 1rem}.pgrid{grid-template-columns:1fr 1fr}
}
@media(min-width:600px){.main{padding:1.75rem}}

<body>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-logo">Quittances <span>de loyer</span></div>
  <div class="pin-sub">Entrez votre code PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-err" id="pin-err">&nbsp;</div>
  <div class="pin-grid">
    <button class="pk" onclick="PP('1')">1</button>
    <button class="pk" onclick="PP('2')">2</button>
    <button class="pk" onclick="PP('3')">3</button>
    <button class="pk" onclick="PP('4')">4</button>
    <button class="pk" onclick="PP('5')">5</button>
    <button class="pk" onclick="PP('6')">6</button>
    <button class="pk" onclick="PP('7')">7</button>
    <button class="pk" onclick="PP('8')">8</button>
    <button class="pk" onclick="PP('9')">9</button>
    <button class="pk empty"></button>
    <button class="pk" onclick="PP('0')">0</button>
    <button class="pk del" onclick="PD()">&#x232B;</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="hdr">
    <div class="hdr-l">
      <button class="hbtn" onclick="goHome()">&#8962;</button>
      <div class="logo">Quittances <span>de loyer</span></div>
    </div>
    <div class="hdr-c"><div class="hprop empty" id="hprop" onclick="goHome()"></div></div>
    <div class="hdr-r"><button class="lbtn" onclick="lockApp()">&#128274;</button></div>
  </header>
  <div id="propnav" style="display:none">
    <div class="propbar"><span class="pbl">Logement</span><div id="chips"></div></div>
    <div class="tabs" id="tabs">
      <button class="tb on" onclick="go('gen')">&#10022; G&eacute;n&eacute;rer</button>
      <button class="tb" onclick="go('arc')">&#9647; Archives</button>
      <button class="tb" onclick="go('cfg')">&#9881; Param&eacute;trage</button>
    </div>
  </div>
  <div id="main"><div class="loading"><div class="spin"></div>&nbsp;Chargement&hellip;</div></div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="m-add" style="display:none">
  <div class="modal">
    <div class="mh"></div><div class="mt">Nouveau logement</div>
    <div class="fi" style="margin-bottom:.5rem">
      <label>Nom du logement</label>
      <input type="text" id="new-name" placeholder="Ex : Appartement Le Havre" autocomplete="off">
    </div>
    <div class="ma">
      <button class="btn bg bfull" onclick="CM('m-add')">Annuler</button>

</div>

    <div class="ma">
      <button class="btn bg bfull" onclick="CM('m-del')">Annuler</button>

<div class="overlay" id="m-mail" style="display:none">
  <div class="modal">
    <div class="mh"></div><div class="mt">Envoyer par mail</div>

    <div class="mp" id="m-mail-body"></div>
    <div class="notice">&#9888; La pi&egrave;ce jointe doit &ecirc;tre attach&eacute;e manuellement depuis Mail.</div>
    <div class="ma">
      <button class="btn bg bfull" onclick="CM('m-mail')">Annuler</button>
      <button class="btn bb bfull" onclick="doMail()">&#9993; Ouvrir dans Mail</button>
    </div>

<script>
// ════════════ PIN ════════════
const PIN = '1818';
let pe = '', locked = true;

function PP(d) {
  if (pe.length >= 4) return;
  pe += d;
  UD();
  if (pe.length === 4) setTimeout(CP, 150);
}
function PD() {
  if (!pe.length) return;
  pe = pe.slice(0,-1);
  UD();
  document.getElementById('pin-err').innerHTML = '&nbsp;';
}
function UD(mode) {
  for (let i=0;i<4;i++) {
    const d = document.getElementById('d'+i);
    if (!d) continue;
    d.className = 'pin-dot';
    if (mode==='err') d.classList.add('error');
    else if (i < pe.length) d.classList.add('filled');
  }
}
function CP() {
  if (pe === PIN) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    locked = false; pe = ''; UD();
    initApp();
  } else {
    UD('err');
    document.getElementById('pin-err').textContent = 'Code incorrect \u2014 r\u00e9essayez';
    setTimeout(()=>{ pe=''; UD(); document.getElementById('pin-err').innerHTML='&nbsp;'; }, 1000);
  }
}
function lockApp() {
  locked = true; pe = ''; UD();
  document.getElementById('pin-err').innerHTML = '&nbsp;';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
}
document.addEventListener('keydown', e => {
  if (!locked) return;
  if (e.key>='0'&&e.key<='9') PP(e.key);
  if (e.key==='Backspace') PD();
});

// ════════════ DB ════════════
const DB='QlDB8', ST='d';
let db, S={properties:[],activePropertyId:null};
let tab='gen', scr='home', dProp=null, dArc=null, mailto='', inited=false;

function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(ST))e.target.result.createObjectStore(ST)};r.onsuccess=e=>{db=e.target.result;res()};r.onerror=rej});}
function dGet(k){return new Promise((res,rej)=>{const r=db.transaction(ST,'readonly').objectStore(ST).get(k);r.onsuccess=()=>res(r.result);r.onerror=rej});}
function dSet(k,v){return new Promise((res,rej)=>{const r=db.transaction(ST,'readwrite').objectStore(ST).put(v,k);r.onsuccess=res;r.onerror=rej});}
async function sv(){await dSet('s',S);}
async function initApp(){
  if(inited){render();return;} inited=true;
  await openDB();
  const saved=await dGet('s');
  if(saved){S=saved;render();ghPush();}
  else{render();const c=ghCfg();if(c.u&&c.r&&c.t){toast('Restauration depuis GitHub\u2026');await ghRestore();}}
}

// ════════════ UTILS ════════════
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function isoD(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function frD(iso){if(!iso)return'';const p=iso.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0].slice(2)}`:iso;}
function frDL(iso){if(!iso)return'';const p=iso.split('-');const m=['janvier','f\u00e9vrier','mars','avril','mai','juin','juillet','ao\u00fbt','septembre','octobre','novembre','d\u00e9cembre'];return`${parseInt(p[2])} ${m[parseInt(p[1])-1]} 20${p[0].slice(2)}`;}
function fm(v){return parseFloat(v||0).toFixed(2).replace('.',',');}
function tot(p){return(p.loyer||0)+(p.majoration||0)+(p.charges||0)+(p.eau||0)+(p.eclairage||0)+(p.chauffage||0)+(p.taxes_locatives||0)+(p.ordures||0)+(p.ascenseur||0)+(p.prestations||0);}
function vil(a){if(!a)return'';const l=(a||'').split('\n').pop().trim();const m=l.match(/\d{5}\s+(.+)/);return m?m[1]:l;}
function san(s){return(s||'').toLowerCase().replace(/[^a-z0-9]/g,'_');}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2800);}
function gP(){return S.properties.find(p=>p.id===S.activePropertyId)||null;}
function nN(p){if(!p.archives||!p.archives.length)return 1;return Math.max(...p.archives.map(a=>a.ni||1))+1;}
function nPer(p){
  if(p.archives&&p.archives.length>0){const l=[...p.archives].sort((a,b)=>b.period_end.localeCompare(a.period_end))[0];const s=new Date(l.period_end+'T00:00:00');const e=new Date(s);e.setMonth(e.getMonth()+1);return{start:isoD(s),end:isoD(e)};}
  if(p.last_end){const s=new Date(p.last_end+'T00:00:00');const e=new Date(s);e.setMonth(e.getMonth()+1);return{start:isoD(s),end:isoD(e)};}
  const n=new Date();return{start:isoD(new Date(n.getFullYear(),n.getMonth(),1)),end:isoD(new Date(n.getFullYear(),n.getMonth()+1,1))};
}
function nProp(name){return{id:'p'+Date.now(),name,pnom:'',padr:'',lnom:'',lprenom:'',lemail:'',lciv:'M.',ladr:'',ladr1:'',loyer:0,majoration:0,charges:0,eau:0,eclairage:0,chauffage:0,taxes_locatives:0,ordures:0,ascenseur:0,prestations:0,sig:null,last_end:null,archives:[]};}

// ════════════ NAV ════════════
function goHome(){scr='home';S.activePropertyId=null;sv();render();}
function selP(id){S.activePropertyId=id;scr='prop';tab='gen';sv();render();}
function go(t){tab=t;render();}

// ════════════ RENDER ════════════
function render(){
  const main=document.getElementById('main'),nav=document.getElementById('propnav'),hp=document.getElementById('hprop');
  if(scr==='home'||!S.activePropertyId){nav.style.display='none';hp.className='hprop empty';hp.textContent='';rHome(main);return;}
  const p=gP();if(!p){scr='home';render();return;}
  nav.style.display='block';
  const ch=document.getElementById('chips');ch.innerHTML='';
  S.properties.forEach(q=>{const c=document.createElement('button');c.className='chip'+(q.id===S.activePropertyId?' on':'');c.textContent=q.name;c.onclick=()=>selP(q.id);ch.appendChild(c);});
  const ac=document.createElement('button');ac.className='chip add';ac.textContent='+ Ajouter';ac.onclick=()=>OM('m-add');ch.appendChild(ac);
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  const tm={gen:0,arc:1,cfg:2};document.querySelectorAll('.tb')[tm[tab]]?.classList.add('on');
  hp.className='hprop';hp.innerHTML=`&#8962; &nbsp;${esc(p.name)}`;
  if(tab==='gen')rGen(main,p);else if(tab==='arc')rArc(main,p);else rCfg(main,p);
}

function rHome(el){
  const ps=S.properties;
  el.innerHTML=`<div class="home"><h1>Mes logements</h1><div class="home-sub">${ps.length===0?'Aucun logement pour l\'instant':`${ps.length} logement${ps.length>1?'s':''} configur\u00e9${ps.length>1?'s':''}`}</div><div class="pgrid">${ps.map(p=>{const n=(p.archives||[]).length;return`<div class="pcard" onclick="selP('${p.id}')"><div class="pcard-icon">\uD83C\uDFE0</div><div class="pcard-name">${esc(p.name)}</div><div class="pcard-meta">${n} quittance${n!==1?'s':''} &middot; ${fm(tot(p))} &euro;/mois</div></div>`;}).join('')}<div class="pcard pcard-add" onclick="OM('m-add')"><div class="ai">+</div><span>Ajouter un logement</span></div></div></div>`;
}

// ════════════ CONFIG ════════════
function rCfg(el,p){
  const c=ghCfg();
  el.innerHTML=`<div class="sh"><div class="sh-t">Param\u00e9trage</div><button class="btn bg bsm" onclick="delP('${p.id}')">\uD83D\uDDD1 Supprimer</button></div>
  <div class="card"><div class="ct">Propri\u00e9taire</div><div class="fg c1">

async function saveCfg(pid){
  const p=S.properties.find(q=>q.id===pid);if(!p)return;
  p.pnom=document.getElementById('c_pnom').value.trim();
  p.padr=document.getElementById('c_padr').value.trim();
  p.lciv=document.getElementById('c_civ').value;
  p.lprenom=document.getElementById('c_lpr').value.trim();
  p.lnom=document.getElementById('c_lno').value.trim();
  p.lemail=document.getElementById('c_eml').value.trim();
  p.ladr=document.getElementById('c_ladr').value.trim();
  p.ladr1=p.ladr.replace(/\n/g,' ');
  ['loyer','majoration','charges','eau','eclairage','chauffage','taxes_locatives','ordures','ascenseur','prestations'].forEach(k=>{p[k]=parseFloat(document.getElementById('c_'+k)?.value||0);});
  p.last_end=document.getElementById('c_lpe').value||null;
  await sv();
  const c=ghCfg();
  if(c.u&&c.r&&c.t){ghPush().then(ok=>toast(ok?'Enregistr\u00e9 et synchronis\u00e9 \u2713':'Param\u00e8tres enregistr\u00e9s \u2713'));}
  else{toast('Param\u00e8tres enregistr\u00e9s \u2713');}
}

function upSig(ev,pid){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{
    const img=new Image();
    img.onload=async()=>{
      const cv=document.createElement('canvas');cv.width=img.naturalWidth;cv.height=img.naturalHeight;
      cv.getContext('2d').drawImage(img,0,0);
      const p=S.properties.find(q=>q.id===pid);if(!p)return;
      p.sig=cv.toDataURL('image/png');await sv();
      const prv=document.getElementById('sigprv');
      if(prv)prv.innerHTML=`<div style="text-align:center"><img src="${p.sig}" style="max-height:70px;max-width:200px;object-fit:contain"><br><small style="color:var(--ink-3);font-size:.72rem;display:block;margin-top:.3rem">Appuyer pour remplacer</small></div>`;
      toast('Signature import\u00e9e \u2713');
    };img.src=e.target.result;
  };r.readAsDataURL(f);
}

async function delP(pid){
  if(!confirm('Supprimer ce logement et toutes ses archives ?'))return;
  S.properties=S.properties.filter(p=>p.id!==pid);S.activePropertyId=null;scr='home';
  await sv();render();toast('Logement supprim\u00e9');
}

// ════════════ GÉNERER ════════════
function rGen(el,p){
  const per=nPer(p),t=tot(p),num=nN(p),today=isoD(new Date()),civ=p.lciv||'M.';
  el.innerHTML=`<div class="sh"><div class="sh-t">G\u00e9n\u00e9rer une quittance</div></div>
  <div class="genbox"><strong>Quittance n\u00b0 ${p2(num)}</strong> &middot; ${esc(civ)} ${esc(p.lprenom)} ${esc(p.lnom)}<br>P\u00e9riode : ${frD(per.start)} &rarr; ${frD(per.end)}<br>Total : <strong>${fm(t)} &euro;</strong></div>
  <div class="card"><div class="ct">P\u00e9riode &amp; date de signature</div>
    <div class="fg c3">
      <div class="fi"><label>D\u00e9but</label><input type="date" id="g_s" value="${per.start}"></div>
      <div class="fi"><label>Fin</label><input type="date" id="g_e" value="${per.end}"></div>
      <div class="fi"><label>Sign\u00e9e le</label><input type="date" id="g_d" value="${today}"></div>
    </div>
  </div>
  <button class="bgen" onclick="doGen('${p.id}')">&#10022; G\u00e9n\u00e9rer et t\u00e9l\u00e9charger en PDF</button>
  <div style="margin-top:1.5rem;margin-bottom:1rem">
    <div style="font-size:.72rem;color:var(--ink-3);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:.5rem">Aper\u00e7u</div>
    <div id="prev"></div>
  </div>`;
  setTimeout(()=>rPrev(p),30);
  ['g_s','g_e','g_d'].forEach(id=>document.getElementById(id)?.addEventListener('change',()=>rPrev(gP())));
}

function rPrev(p){if(!p)return;const a=document.getElementById('prev');if(!a)return;a.innerHTML=qDoc(p);}

function qDoc(p){
  const s=document.getElementById('g_s')?.value||isoD(new Date());
  const e=document.getElementById('g_e')?.value||isoD(new Date());
  const d=document.getElementById('g_d')?.value||isoD(new Date());
  const num=p2(nN(p)),t=tot(p),v=vil(p.padr),civ=p.lciv||'M.';
  const rows=[['Loyer',p.loyer],['Majoration',p.majoration],['Charges',p.charges],['Eau',p.eau],['\u00c9clairage',p.eclairage],['Chauffage',p.chauffage],['Taxes locatives',p.taxes_locatives],['Ordures m\u00e9nag\u00e8res',p.ordures],['Ascenseur',p.ascenseur],['Prestations',p.prestations]];
  const sig=p.sig?`<img src="${p.sig}" style="max-height:50px;max-width:130px;display:block;">`:`<div style="width:130px;border-bottom:1px solid #333;height:28px;"></div>`;
  return`<div class="qdoc"><div class="qh"><div class="qprop"><strong>${esc(p.pnom)}</strong><br>${(p.padr||'').split('\n').map(esc).join('<br>')}</div><div class="qtb"><div class="qtitle">Quittance de loyer</div><div class="qnum">N&deg; ${num}</div></div></div>
  <table class="qtab"><thead><tr><th style="width:60%">D\u00e9signation</th><th>Montant (\u20ac)</th></tr></thead><tbody>${rows.map(([l,v2])=>`<tr><td>${l}</td><td>${fm(v2)}</td></tr>`).join('')}</tbody><tfoot><tr class="tot-r"><td><strong>Total</strong></td><td><strong>${fm(t)}</strong></td></tr></tfoot></table>
  <div class="qbody">Re\u00e7u de ${esc(civ)} <strong>${esc(p.lprenom)} ${esc(p.lnom)}</strong>,<br>au titre du paiement du loyer et des charges du logement/local sis<br>\u00e0 <strong>${esc(p.ladr1||p.ladr||'')}</strong>,<br>pour la p\u00e9riode du <strong>${frD(s)}</strong> au <strong>${frD(e)}</strong>,<br>la somme de <strong>${fm(t)} \u20ac</strong>.</div>
  <div class="qres">Dont quittance, et sous r\u00e9serve de tous mes droits.</div>
  <div class="qfoot"><div>A ${esc(v)},<br>le ${frD(d)}</div><div style="text-align:right"><div style="color:#666;font-size:9.5px;margin-bottom:3px">Signature :</div>${sig}</div></div></div>`;
}

async function doGen(pid){
  const p=S.properties.find(q=>q.id===pid);if(!p)return;
  if(!p.pnom||!p.lnom||(!(p.ladr||p.ladr1))){toast('\u26a0 Compl\u00e9tez le param\u00e9trage d\'abord');return;}
  const s=document.getElementById('g_s').value,e=document.getElementById('g_e').value,d=document.getElementById('g_d').value;
  const t=tot(p),num=nN(p),ns=p2(num);
  const arc={id:'a'+Date.now(),numero:ns,ni:num,date_generation:d,period_start:s,period_end:e,total:t,locataire:`${p.lprenom} ${p.lnom}`,civ:p.lciv||'M.'};
  if(!p.archives)p.archives=[];
  p.archives.push(arc);p.archives.sort((a,b)=>a.period_start.localeCompare(b.period_start));
  await sv();bPDF(p,arc);tab='arc';render();
  setTimeout(()=>sBanner(p,arc),80);
  ghPush();
}

function sBanner(p,arc){
  const main=document.getElementById('main');if(!main)return;
  const b=document.createElement('div');b.className='mailbanner';
  const he=!!p.lemail;
  b.innerHTML=`<div class="mailbanner-t">\u2713 Quittance n\u00b0 ${arc.numero} g\u00e9n\u00e9r\u00e9e et t\u00e9l\u00e9charg\u00e9e</div>${he?`<p>Envoyer \u00e0 <strong>${esc(p.lemail)}</strong>&nbsp;?</p><div style="margin-top:.75rem"><button class="btn bb" onclick="OM2('${p.id}','${arc.id}');this.closest('.mailbanner').remove()">\u2709 Pr\u00e9parer le mail</button></div><div class="atip"><strong>\uD83D\uDCCE Attacher le PDF :</strong>Maintenez le doigt dans Mail \u2192 "Ins\u00e9rer pi\u00e8ce jointe".</div>`:`<p>Ajoutez l'e-mail dans les <button class="btn bg bsm" style="display:inline-flex;padding:.2rem .6rem" onclick="go('cfg')">param\u00e8tres</button>.</p>`}`;
  main.insertBefore(b,main.firstChild);
}

// ════════════ PDF ════════════
function bPDF(p,arc){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a5',orientation:'portrait'});
  const v=vil(p.padr),civ=arc.civ||p.lciv||'M.';let y=14;
  doc.setFont('helvetica');doc.setFontSize(9);doc.setTextColor(80,80,80);
  doc.text(p.pnom||'',14,y);y+=4;(p.padr||'').split('\n').forEach(l=>{doc.text(l,14,y);y+=4;});
  doc.setFontSize(15);doc.setFont('helvetica','bold');doc.setTextColor(26,110,58);
  doc.text('QUITTANCE DE LOYER',143,14,{align:'right'});
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
  doc.text('N\u00b0 '+arc.numero,143,21,{align:'right'});
  y=Math.max(y,28)+4;
  doc.setFillColor(240,240,240);doc.rect(14,y,134,7,'F');
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);
  doc.text('D\u00e9signation',16,y+5);doc.text('Montant (\u20ac)',144,y+5,{align:'right'});y+=7;
  const rows=[['Loyer',p.loyer],['Majoration',p.majoration],['Charges',p.charges],['Eau',p.eau],['\u00c9clairage',p.eclairage],['Chauffage',p.chauffage],['Taxes locatives',p.taxes_locatives],['Ordures m\u00e9nag\u00e8res',p.ordures],['Ascenseur',p.ascenseur],['Prestations',p.prestations]];
  doc.setFont('helvetica','normal');doc.setFontSize(8);
  rows.forEach(([l,v2])=>{doc.setDrawColor(210,210,210);doc.setLineWidth(0.2);doc.line(14,y,148,y);doc.setTextColor(60,60,60);doc.text(l,16,y+5);doc.text(fm(v2),144,y+5,{align:'right'});y+=7;});
  doc.setDrawColor(140,140,140);doc.setLineWidth(0.5);doc.line(14,y,148,y);doc.setLineWidth(0.2);
  doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text('Total',16,y+6);doc.text(fm(arc.total)+' \u20ac',144,y+6,{align:'right'});y+=12;
  doc.setDrawColor(200,200,200);doc.rect(14,y,134,40);
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(30,30,30);let by=y+7;
  ['Re\u00e7u de '+civ+' '+p.lprenom+' '+p.lnom+',','au titre du paiement du loyer et des charges du logement/local sis','\u00e0 '+(p.ladr1||p.ladr||'')+',','pour la p\u00e9riode du '+frD(arc.period_start)+' au '+frD(arc.period_end)+',','la somme de '+fm(arc.total)+' \u20ac.'].forEach(l=>{doc.text(l,16,by);by+=6;});
  y+=45;
  doc.setFontSize(7.5);doc.setTextColor(100,100,100);doc.setFont('helvetica','italic');doc.text('Dont quittance, et sous r\u00e9serve de tous mes droits.',14,y);y+=10;
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
  doc.text('A '+v+',',14,y);doc.text('le '+frD(arc.date_generation),14,y+5);doc.text('Signature :',105,y);
  if(p.sig){try{doc.addImage(p.sig,'PNG',103,y+3,38,18,'','FAST');}catch(err){doc.line(103,y+22,148,y+22);}}else{doc.line(103,y+22,148,y+22);}
  doc.save('quittance_'+san(p.name)+'_'+arc.period_start+'_n'+arc.numero+'.pdf');
}

// ════════════ ARCHIVES ════════════
function rArc(el,p){
  const arcs=[...(p.archives||[])].sort((a,b)=>a.period_start.localeCompare(b.period_start));
  el.innerHTML=`<div class="sh"><div class="sh-t">Archives</div><span style="font-size:.82rem;color:var(--ink-3)">${arcs.length} quittance${arcs.length!==1?'s':''}</span></div>${arcs.length===0?`<div class="empty" style="padding:3rem 1rem"><div class="ei">\uD83D\uDCC4</div><h2>Aucune archive</h2><p>Les quittances g\u00e9n\u00e9r\u00e9es appara\u00eetront ici.</p></div>`:arcs.map(a=>`<div class="arc"><div class="abadge">N\u00b0 ${a.numero}</div><div class="ainfo"><div class="aten">${esc(a.locataire)}</div><div class="aper">${frD(a.period_start)} \u2192 ${frD(a.period_end)} <span style="color:var(--ink-4)">&middot; ${frD(a.date_generation)}</span></div></div><div class="aamt">${fm(a.total)} \u20ac</div><div class="aact"><button class="btn bg bsm" onclick="rePDF('${p.id}','${a.id}')">&#8595;</button><button class="btn bg bsm" style="color:var(--blue);border-color:#b0c8e8" onclick="OM2('${p.id}','${a.id}')">&#9993;</button><button class="btn bg bsm" style="color:var(--danger);border-color:#f5c4b0" onclick="askDel('${p.id}','${a.id}','${a.numero}','${esc(a.locataire)}','${frD(a.period_start)}','${frD(a.period_end)}')">&#10005;</button></div></div>`).join('')}`;
}

function askDel(pid,aid,num,loc,s,e){dProp=pid;dArc=aid;document.getElementById('del-info').innerHTML=`Quittance <strong>n\u00b0 ${num}</strong> \u2014 ${esc(loc)}<br>P\u00e9riode : ${s} \u2192 ${e}`;OM('m-del');}
async function doDel(){
  const p=S.properties.find(q=>q.id===dProp);if(!p){CM('m-del');return;}
  p.archives=p.archives.filter(a=>a.id!==dArc);p.archives.sort((a,b)=>a.period_start.localeCompare(b.period_start));
  p.archives.forEach((a,i)=>{a.ni=i+1;a.numero=p2(i+1);});
  await sv();CM('m-del');render();toast('Quittance supprim\u00e9e \u00b7 num\u00e9ros recalcul\u00e9s \u2713');ghPush();
}
function rePDF(pid,aid){const p=S.properties.find(q=>q.id===pid);if(!p)return;const a=p.archives.find(b=>b.id===aid);if(!a)return;bPDF(p,a);toast('PDF ret\u00e9l\u00e9charg\u00e9 \u2713');}

// ════════════ MAIL ════════════
function mbody(p,arc){
  const civ=arc.civ||p.lciv||'M.';
  return 'Bonjour '+civ+' '+p.lnom+',\n\nVeuillez trouver ci-joint votre quittance de loyer n\u00b0 '+arc.numero+' pour la p\u00e9riode du '+frDL(arc.period_start)+' au '+frDL(arc.period_end)+', d\'un montant de '+fm(arc.total)+' \u20ac.\n\nN\'h\u00e9sitez pas \u00e0 me contacter si vous avez la moindre question.\n\nCordialement,\n'+(p.pnom||'');
}
function OM2(pid,aid){
  const p=S.properties.find(q=>q.id===pid);if(!p)return;
  const arc=p.archives.find(a=>a.id===aid);if(!arc)return;
  if(!p.lemail){toast('\u26a0 Ajoutez l\'email du locataire dans les param\u00e8tres');return;}
  const subj='Quittance de loyer n\u00b0 '+arc.numero,body=mbody(p,arc);
  mailto='mailto:'+encodeURIComponent(p.lemail)+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
  const fn='quittance_'+san(p.name)+'_'+arc.period_start+'_n'+arc.numero+'.pdf';
  document.getElementById('m-mail-sub').textContent='Quittance n\u00b0 '+arc.numero+' \u00b7 '+arc.locataire;
  document.getElementById('m-mail-body').innerHTML='<div class="mf"><strong>\u00c0&nbsp;:</strong><span>'+esc(p.lemail)+'</span></div><div class="mf"><strong>Objet&nbsp;:</strong><span>'+esc(subj)+'</span></div><div class="mb">'+esc(body)+'</div><div class="mattach">\uD83D\uDCCE '+esc(fn)+' <span style="color:var(--ink-3);font-size:.73rem">(\u00e0 attacher manuellement)</span></div>';
  OM('m-mail');
}
function doMail(){if(mailto)window.location.href=mailto;CM('m-mail');toast('App Mail ouverte \u2713');}

// ════════════ MODALS ════════════
function OM(id){document.getElementById(id).style.display='flex';}
function CM(id){document.getElementById(id).style.display='none';if(id==='m-add')document.getElementById('new-name').value='';if(id==='m-del'){dProp=null;dArc=null;}if(id==='m-mail')mailto='';}
['m-add','m-del','m-mail'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id)CM(id);});});
document.getElementById('new-name').addEventListener('keydown',e=>{if(e.key==='Enter')doAdd();});
async function doAdd(){
  const name=document.getElementById('new-name').value.trim();if(!name){toast('\u26a0 Saisissez un nom');return;}
  CM('m-add');const p=nProp(name);S.properties.push(p);S.activePropertyId=p.id;
  scr='prop';tab='gen';await sv();render();toast('"'+name+'" cr\u00e9\u00e9 \u2713');
}

// ════════════ GITHUB ════════════
function ghCfg(){try{return JSON.parse(localStorage.getItem('gh')||'{}');}catch(e){return {};}}
function ghSave(){
  const u=(document.getElementById('gh-u')?.value||'').trim();
  const r=(document.getElementById('gh-r')?.value||'').trim();
  const t=(document.getElementById('gh-t')?.value||'').trim();
  if(!u||!r||!t){toast('\u26a0 Remplissez les 3 champs GitHub');return;}
  localStorage.setItem('gh',JSON.stringify({u,r,t}));
  toast('Configuration GitHub enregistr\u00e9e \u2713');
  render();
}
async function ghPush(){
  const c=ghCfg();if(!c.u||!c.r||!c.t)return false;
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(S,null,2))));
    const url='https://api.github.com/repos/'+c.u+'/'+c.r+'/contents/data.json';
    let sha=null;
    try{const g=await fetch(url,{headers:{'Authorization':'token '+c.t,'Accept':'application/vnd.github.v3+json'}});if(g.ok){const j=await g.json();sha=j.sha;}}catch(e){}
    const body={message:'Sauvegarde '+new Date().toISOString().slice(0,16).replace('T',' '),content};
    if(sha)body.sha=sha;
    const res=await fetch(url,{method:'PUT',headers:{'Authorization':'token '+c.t,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});
    return res.ok;
  }catch(e){console.error('gh push error',e);return false;}
}
async function ghSync(){
  const c=ghCfg();if(!c.u||!c.r||!c.t){toast('\u26a0 Configurez GitHub d\'abord');return;}
  toast('Synchronisation\u2026');
  const ok=await ghPush();
  toast(ok?'Synchronis\u00e9 sur GitHub \u2713':'\u26a0 Erreur de synchronisation');
}
async function ghRestore(){
  const c=ghCfg();if(!c.u||!c.r||!c.t)return;
  try{
    const url='https://api.github.com/repos/'+c.u+'/'+c.r+'/contents/data.json';
    const res=await fetch(url,{headers:{'Authorization':'token '+c.t,'Accept':'application/vnd.github.v3+json'}});
    if(!res.ok)return;
    const j=await res.json();
    const d=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
    if(d&&d.properties){S=d;await sv();render();toast('Donn\u00e9es restaur\u00e9es depuis GitHub \u2713');}
  }catch(e){console.error('gh restore error',e);}
}
function expData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='quittances-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);toast('Sauvegarde export\u00e9e \u2713');
}
function impData(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.properties)throw new Error('Format invalide');
      if(!confirm('Remplacer toutes vos donn\u00e9es actuelles ?'))return;
      S=d;await sv();render();toast('Donn\u00e9es import\u00e9es \u2713');
    }catch(e){toast('\u26a0 Fichier invalide');}
  };r.readAsText(f);ev.target.value='';
}
</script>
